spring.application.name=restaurant-backend


# ==========================================
# TiDB Cloud Connection (Serverless)
# ==========================================
spring.datasource.url=${DATABASE_URL}
spring.datasource.username={DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver



# ==========================================
# JPA/Hibernate avec dialecte TiDB
# ==========================================
spring.jpa.hibernate.ddl-auto=update
# Essayez d'abord TiDBDialect, sinon MySQL8Dialect
# Utilisez le dialecte moderne (Hibernate 6+)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect




# ==========================================
# Port
# ==========================================
server.port=${PORT:8080}

# ==========================================
# Timezone
# ==========================================
spring.jackson.time-zone=Indian/Antananarivo

# ==========================================
# Batch operations (performance)
# ==========================================
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# === Configuration API Brevo (alternative au SMTP) ===
brevo.api.key=${BREVO_API_KEY}
brevo.api.url=https://api.brevo.com/v3/smtp/email
app.frontend.url=https://projet-springboot.vercel.app