spring.application.name=restaurant-backend
server.port=8080

# ==========================================
# TiDB Cloud Connection - CORRECT
# ==========================================
spring.datasource.url=jdbc:mysql://gateway01.ap-northeast-1.prod.aws.tidbcloud.com:4000/restaurant_db?ssl-mode=REQUIRED
spring.datasource.username=3y2a7mbYtKZMVUL.root
spring.datasource.password=aISqtD2hiPKWhtZR
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# HikariCP (plus de limite de 5 connexions)
# ==========================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ==========================================
# JPA/Hibernate - TiDB optimisé
# ==========================================
spring.jpa.hibernate.ddl-auto=update

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.TiDBDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ==========================================
# Fichiers uploadés
# ==========================================
upload.path=./uploads
spring.web.resources.static-locations=classpath:/static/,file:.uploads/
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ==========================================
# Timezone
# ==========================================
spring.jackson.time-zone=Indian/Antananarivo

# Affiche TOUTES les requêtes SQL
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Compte aussi les requêtes (pour voir le N+1)
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE