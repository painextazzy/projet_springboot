spring.application.name=restaurant-backend
server.port=8080
spring.datasource.url=jdbc:mysql://localhost:3306/restaurant_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Configuration des fichiers uploadés
upload.path=./uploads

# Servir les fichiers statiques depuis le dossier uploads
spring.web.resources.static-locations=classpath:/static/,file:./uploads/

# Taille maximale des fichiers (10 MB)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jackson.time-zone=Indian/Antananarivo