spring.datasource.url=jdbc:mysql://gateway01.ap-northeast-1.prod.aws.tidbcloud.com:4000/tests?serverTimezone=Indian/Antananarivo&useSSL=true&enabledTLSProtocols=TLSv1.2,TLSv1.3&autoReconnect=true&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true&useCursorFetch=false
